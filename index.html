<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code 批次產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        canvas { max-width: 100%; height: auto; }
        .loading-animation {
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-2xl shadow-md p-6 mb-8 border border-gray-200">
            <h1 class="text-xl font-bold mb-2 text-gray-800">批次 QR Code 產生器</h1>
            <p class="text-gray-500 text-sm mb-4">輸入推薦碼（每行一個），將自動整合文字至圖片中。</p>
            
            <textarea 
                id="batchInput" 
                rows="4" 
                class="w-full border border-gray-300 rounded-xl p-4 focus:ring-2 focus:ring-red-500 outline-none mb-4 font-mono text-sm"
                placeholder="USER001&#10;USER002"
            ></textarea>
            
            <button 
                id="generateBtn" 
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition shadow-md active:scale-95 disabled:bg-gray-400"
            >
                產生整合圖片
            </button>
        </div>

        <!-- 隱藏的容器 -->
        <div id="hiddenQrContainer" style="display:none;"></div>

        <!-- 結果顯示區 -->
        <div id="resultsContainer" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        const BASE_URL = "https://rb.feib.com.tw/ACTIWeb/contact/index.jsp?actcode=CASA202605&recommender=";
        const batchInput = document.getElementById('batchInput');
        const generateBtn = document.getElementById('generateBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const hiddenQrContainer = document.getElementById('hiddenQrContainer');

        // 強化的 QR Code 抓取邏輯
        function getQrSource(text) {
            return new Promise((resolve, reject) => {
                hiddenQrContainer.innerHTML = '';
                const fullUrl = BASE_URL + encodeURIComponent(text);
                
                // 建立 QRCode 實例
                const qrcode = new QRCode(hiddenQrContainer, {
                    text: fullUrl,
                    width: 300,
                    height: 300,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });

                let attempts = 0;
                const maxAttempts = 40; // 最多等 2 秒

                const timer = setInterval(() => {
                    attempts++;
                    // 優先抓取 Canvas (最穩定)，如果沒有則抓取 Img
                    const canvas = hiddenQrContainer.querySelector('canvas');
                    const img = hiddenQrContainer.querySelector('img');
                    
                    if (canvas) {
                        clearInterval(timer);
                        resolve(canvas.toDataURL("image/png"));
                    } else if (img && img.src && img.src.length > 100) {
                        clearInterval(timer);
                        resolve(img.src);
                    }

                    if (attempts >= maxAttempts) {
                        clearInterval(timer);
                        reject('產生逾時');
                    }
                }, 50);
            });
        }

        async function createFinalImage(code, qrDataUrl) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                
                img.onload = function() {
                    const qrSize = 300;
                    const padding = 20;
                    const labelHeight = 60;
                    
                    canvas.width = qrSize + (padding * 2);
                    canvas.height = qrSize + (padding * 2) + labelHeight;

                    // 底色
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // 繪製 QR
                    ctx.drawImage(img, padding, padding, qrSize, qrSize);

                    // 繪製文字區域
                    ctx.fillStyle = "#F3F4F6";
                    ctx.fillRect(padding, qrSize + padding, qrSize, labelHeight);
                    
                    // 繪製推薦碼文字
                    ctx.fillStyle = "#000000";
                    ctx.font = "bold 24px Arial, sans-serif";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(code, canvas.width / 2, qrSize + padding + (labelHeight / 2));

                    resolve(canvas.toDataURL("image/png"));
                };
                img.src = qrDataUrl;
            });
        }

        generateBtn.addEventListener('click', async () => {
            const lines = batchInput.value.split('\n').map(l => l.trim()).filter(l => l !== '');
            if (lines.length === 0) return;

            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="loading-animation">正在處理中...</span>';
            resultsContainer.innerHTML = '';

            for (const code of lines) {
                try {
                    const qrSource = await getQrSource(code);
                    const finalImg = await createFinalImage(code, qrSource);
                    
                    const div = document.createElement('div');
                    div.className = "bg-white p-3 rounded-xl shadow border border-gray-200 flex flex-col items-center";
                    div.innerHTML = `
                        <img src="${finalImg}" class="w-full h-auto rounded mb-2 shadow-sm">
                        <span class="text-xs font-bold text-gray-500 mb-2">${code}</span>
                        <button onclick="copyToClipboard('${BASE_URL + encodeURIComponent(code)}', this)" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 text-[10px] py-1.5 rounded transition">
                            複製連結
                        </button>
                    `;
                    resultsContainer.appendChild(div);
                } catch (err) {
                    console.error(err);
                }
            }

            generateBtn.disabled = false;
            generateBtn.textContent = '產生整合圖片';
        });

        function copyToClipboard(text, btn) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const oldText = btn.textContent;
            btn.textContent = "已複製！";
            btn.classList.add('text-green-600');
            setTimeout(() => {
                btn.textContent = oldText;
                btn.classList.remove('text-green-600');
            }, 1000);
        }
    </script>
</body>
</html>
